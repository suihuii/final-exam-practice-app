<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">单母线分段接线示意图</title>
  <desc id="desc">母线I和母线II通过分段断路器连接，两侧各有进线和出线。</desc>
  <defs><style>text{font-family:Arial,'Microsoft YaHei',sans-serif;fill:#111;font-size:20px}.small{font-size:16px}.wire{stroke:#111;stroke-width:4;fill:none}.thin{stroke-width:2}.bus{stroke-width:7}.box{fill:#fff;stroke:#111;stroke-width:2}.label{font-weight:700}</style></defs>
  <rect x="28" y="24" width="844" height="472" fill="#fff" stroke="#222" stroke-width="2"/>
  <text x="450" y="58" text-anchor="middle" class="label">单母线分段接线</text>
  <path d="M120 210 H390" class="wire bus"/>
  <path d="M510 210 H780" class="wire bus"/>
  <text x="255" y="188" text-anchor="middle">母线Ⅰ</text>
  <text x="645" y="188" text-anchor="middle">母线Ⅱ</text>
  <path d="M390 210 H510" class="wire"/>
  <rect x="425" y="176" width="70" height="68" class="box"/>
  <text x="460" y="205" text-anchor="middle" class="small">分段</text><text x="460" y="228" text-anchor="middle" class="small">QF</text>
  <path d="M210 98 V210" class="wire"/><rect x="176" y="112" width="68" height="52" class="box"/><text x="210" y="145" text-anchor="middle" class="small">QF1</text><text x="210" y="88" text-anchor="middle" class="small">电源1</text>
  <path d="M690 98 V210" class="wire"/><rect x="656" y="112" width="68" height="52" class="box"/><text x="690" y="145" text-anchor="middle" class="small">QF2</text><text x="690" y="88" text-anchor="middle" class="small">电源2</text>
  <path d="M160 210 V342" class="wire"/><path d="M300 210 V342" class="wire"/><path d="M600 210 V342" class="wire"/><path d="M740 210 V342" class="wire"/>
  <rect x="128" y="276" width="64" height="48" class="box"/><rect x="268" y="276" width="64" height="48" class="box"/><rect x="568" y="276" width="64" height="48" class="box"/><rect x="708" y="276" width="64" height="48" class="box"/>
  <text x="160" y="305" text-anchor="middle" class="small">QF</text><text x="300" y="305" text-anchor="middle" class="small">QF</text><text x="600" y="305" text-anchor="middle" class="small">QF</text><text x="740" y="305" text-anchor="middle" class="small">QF</text>
  <text x="160" y="375" text-anchor="middle" class="small">出线1</text><text x="300" y="375" text-anchor="middle" class="small">出线2</text><text x="600" y="375" text-anchor="middle" class="small">出线3</text><text x="740" y="375" text-anchor="middle" class="small">出线4</text>
  <text x="450" y="444" text-anchor="middle" class="small">一段母线故障或检修时，断开分段断路器可限制停电范围</text>
</svg>